<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wing Commander - Duck Ops</title>
    <link rel="stylesheet" href="../interface/style.css">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #webcam-view {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            z-index: 100;
            transform: scaleX(-1);
        }
        #plane {
            position: absolute;
            left: 100px;
            top: 50%;
            width: 120px;
            transition: top 0.1s ease-out;
            z-index: 50;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            pointer-events: none;
        }
        .enemy {
            position: absolute;
            width: 60px;
            z-index: 40;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: var(--primary);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            ALTITUDE: <span id="alt">0</span>m<br>
            DISTANCE: <span id="dist">0</span>km
        </div>

        <a href="../interface/index.html" class="back-btn" style="position: absolute; top: 20px; right: 230px; z-index: 101;">ABORT</a>

        <img id="plane" src="../assets/images/su34.png" alt="SU-34" onerror="this.src='https://cdn-icons-png.flaticon.com/512/579/579268.png'">
        
        <video id="webcam-view" autoplay playsinline></video>
        
        <div id="scrolling-bg"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
